services:
  radicale:
    image: tomsquest/docker-radicale
    ports:
      - "5232:5232"
    environment:
      # Disable authentication for testing
      RADICALE_AUTH__TYPE: none
    tmpfs:
      - /data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5232/.web/"]
      interval: 2s
      timeout: 5s
      retries: 10

  vikunja:
    image: vikunja/vikunja
    ports:
      - "3457:3456"
    environment:
      VIKUNJA_SERVICE_PUBLICURL: http://localhost:3457
      VIKUNJA_SERVICE_ENABLEREGISTRATION: "true"
      VIKUNJA_SERVICE_TESTINGTOKEN: ""
      VIKUNJA_DATABASE_TYPE: sqlite
      VIKUNJA_DATABASE_PATH: /db/vikunja.db
    tmpfs:
      - /db:uid=1000
      - /app/vikunja/files:uid=1000
    healthcheck:
      test: ["CMD", "/app/vikunja/vikunja", "help"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 5s

  nextcloud:
    image: nextcloud:stable-apache
    ports:
      - "8080:80"
    environment:
      NEXTCLOUD_ADMIN_USER: admin
      NEXTCLOUD_ADMIN_PASSWORD: admin
      SQLITE_DATABASE: nextcloud
    volumes:
      - nextcloud-data:/var/www/html
    healthcheck:
      test: ["CMD", "bash", "-c", "curl -sf http://localhost:80/status.php | grep -q '\"installed\":true'"]
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 120s

  baikal:
    image: ckulka/baikal:nginx
    ports:
      - "8081:80"
    environment:
      # We mount config read-only and seed the DB ourselves, so skip the
      # image's recursive chown (it fails on the read-only config mount).
      BAIKAL_SKIP_CHOWN: "1"
    volumes:
      - ./test/docker/baikal/baikal.yaml:/seed/baikal.yaml:ro
      - ./test/docker/baikal/10-seed-db.sh:/docker-entrypoint.d/10-seed-db.sh:ro
      - baikal-db:/var/www/baikal/Specific/db
    healthcheck:
      test: ["CMD", "curl", "-fsS", "-o", "/dev/null", "http://localhost:80/admin/"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 10s

volumes:
  nextcloud-data:
  baikal-db:
