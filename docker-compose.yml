services:
  radicale:
    image: tomsquest/docker-radicale
    ports:
      - "5232:5232"
    environment:
      # Disable authentication for testing
      RADICALE_AUTH__TYPE: none
    tmpfs:
      - /data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5232/.web/"]
      interval: 2s
      timeout: 5s
      retries: 10

  vikunja:
    image: vikunja/vikunja
    ports:
      - "3457:3456"
    environment:
      VIKUNJA_SERVICE_PUBLICURL: http://localhost:3457
      VIKUNJA_SERVICE_ENABLEREGISTRATION: "true"
      VIKUNJA_SERVICE_TESTINGTOKEN: ""
      VIKUNJA_DATABASE_TYPE: sqlite
      VIKUNJA_DATABASE_PATH: /db/vikunja.db
    tmpfs:
      - /db:uid=1000
      - /app/vikunja/files:uid=1000
    healthcheck:
      test: ["CMD", "/app/vikunja/vikunja", "help"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 5s
